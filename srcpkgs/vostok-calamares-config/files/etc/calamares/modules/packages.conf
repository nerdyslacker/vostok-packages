# Установка пакетов для Vostok Linux KDE Workstation
---
backend: shell
update_db: true

# Список пакетов для установки (полный)
packages:
  # Базовые системные пакеты
  - base-system
  - linux6.6
  - linux-firmware
  
  # Видео и графика
  - mesa-dri
  - xorg-minimal
  
  # Окружение рабочего стола KDE
  - kde5
  - sddm
  - qt6-wayland
  
  # Системные сервисы (elogind версия!)
  - dbus-elogind
  - polkit-elogind
  - elogind
  - wireplumber-elogind
  - rtkit
  
  # Сеть и Bluetooth
  - NetworkManager
  - bluez
  
  # Основные приложения KDE
  - dolphin
  - konsole
  - spectacle
  - discover
  - flatpak-kcm
  
  # Загрузчик
  - grub-x86_64-efi
  
  # Системные утилиты
  - sudo
  - nano
  - curl
  - git
  - xdg-utils
  
  # Пользовательские приложения
  - firefox
  - telegram-desktop
  - octoxbps
  
  # Пакеты Vostok Linux (ТВОИ!)
  - vostok-release
  - vostok-mirrorlist
  - vostok-logo
  
  # Драйверы (опционально)
  # - nvidia  # раскомментируй если нужен

# Пакеты для удаления (если есть в базе)
remove:
  - void-repo-multilib

# Скрипт установки с поддержкой локального репозитория
script: |
  #!/bin/bash
  set -e
  
  TARGET_ROOT="$1"
  
  # Проверяем путь
  if [ ! -d "$TARGET_ROOT" ]; then
    echo "ОШИБКА: Не найден корневой каталог: $TARGET_ROOT"
    exit 1
  fi
  
  echo "=== Установка пакетов Vostok Linux ==="
  
  # 1. Настраиваем репозитории в целевой системе
  echo "1. Настраиваем репозитории..."
  
  # Основной репозиторий Void
  mkdir -p "$TARGET_ROOT/etc/xbps.d"
  cat > "$TARGET_ROOT/etc/xbps.d/00-void.conf" << EOF
  repository=https://repo-default.voidlinux.org/current
  repository=https://repo-default.voidlinux.org/current/nonfree
  EOF
  
  # Репозиторий Vostok (есть на ISO)
  LOCAL_VOSTOK_REPO="/run/initramfs/live/LiveOS/vostok_repo"
  
  if [ -d "$LOCAL_VOSTOK_REPO" ]; then
    # Используем локальный репозиторий с ISO
    echo "2. Используем локальный репозиторий Vostok..."
    cat > "$TARGET_ROOT/etc/xbps.d/10-vostok-local.conf" << EOF
  repository=file://$LOCAL_VOSTOK_REPO
  EOF
  else
    # Используем сетевой репозиторий Vostok
    echo "2. Используем сетевой репозиторий Vostok..."
    cat > "$TARGET_ROOT/etc/xbps.d/10-vostok-remote.conf" << EOF
  repository=https://repo.vostoklinux.org/current
  repository=https://repo.vostoklinux.org/current/nonfree
  EOF
  fi
  
  # 2. Синхронизируем базу данных пакетов
  echo "3. Синхронизируем базу данных XBPS..."
  xbps-install -S -y -r "$TARGET_ROOT"
  
  # 3. Устанавливаем пакеты
  echo "4. Устанавливаем ${#packages[@]} пакетов..."
  
  # Разделяем на группы для лучшего контроля
  CORE_PKGS=(
    base-system linux6.6 linux-firmware
    mesa-dri xorg-minimal
    dbus-elogind polkit-elogind elogind wireplumber-elogind rtkit
    grub-x86_64-efi sudo
  )
  
  DESKTOP_PKGS=(
    kde5 sddm qt6-wayland
    dolphin konsole spectacle discover flatpak-kcm
    NetworkManager bluez
  )
  
  APPS_PKGS=(
    firefox telegram-desktop octoxbps
    nano curl git xdg-utils
  )
  
  VOSTOK_PKGS=(
    vostok-release vostok-mirrorlist vostok-logo
  )
  
  # Устанавливаем группы по очереди
  xbps-install -y -r "$TARGET_ROOT" "${CORE_PKGS[@]}"
  xbps-install -y -r "$TARGET_ROOT" "${DESKTOP_PKGS[@]}"
  xbps-install -y -r "$TARGET_ROOT" "${APPS_PKGS[@]}"
  
  # Пакеты Vostok - если не установятся, продолжаем
  echo "5. Устанавливаем пакеты Vostok..."
  if xbps-install -y -r "$TARGET_ROOT" "${VOSTOK_PKGS[@]}" 2>/dev/null; then
    echo "✓ Пакеты Vostok установлены успешно"
  else
    echo "⚠ Не удалось установить пакеты Vostok (возможно, нет в репозитории)"
  fi
  
  # 4. Переконфигурируем систему
  echo "6. Конфигурируем систему..."
  chroot "$TARGET_ROOT" xbps-reconfigure -fa
  
  echo "✅ Установка пакетов завершена!"