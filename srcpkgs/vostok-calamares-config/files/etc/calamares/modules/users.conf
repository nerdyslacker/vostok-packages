# Настройки пользователей для Vostok Linux
---
# Группы по умолчанию - АДАПТИРОВАНЫ ДЛЯ VOID
defaultGroups:
  - wheel          # sudo и polkit (ВАЖНО!)
  - audio          # звук
  - video          # базовый доступ к GPU
  - storage        # доступ к внешним накопителям
  - optical        # CD/DVD
  - network        # сетевое оборудование
  - input          # мышь/клавиатура
  - kvm            # виртуализация
  - render         # КРИТИЧНО: графическое ускорение (Intel/AMD)
  - users          # стандартная группа пользователей

# Автовход (если используешь SDDM/LightDM/GDM)
autologinGroup: "autologin"
doAutologin: false  # по умолчанию выключен для безопасности

# Настройки паролей
setRootPassword: true     # ОБЯЗАТЕЛЬНО для Void
doReusePassword: false    # разные пароли для root и пользователя

# Права sudo
sudoersGroup: "wheel"
sudoStyle: "sudo"

# Требования к паролю
passwordRequirements:
  minLength: 6           # повышаем до 6 символов
  maxLength: -1          # без ограничений
  nonempty: true
  # Дополнительные требования (опционально):
  # minUpper: 0
  # minLower: 0
  # minDigit: 0
  # minSpec: 0

# Shell для Void
userShell: "/bin/bash"
rootShell: "/bin/bash"

# Дополнительные настройки для Void
hostname:
  location: "Etc/UTC"    # или "Europe/Moscow" для локализации
  writeHostsFile: true

# Политики паролей (опционально, но полезно)
passwordPolicy:
  minLength: 6
  maxLength: 72
  allowWeakPasswords: false