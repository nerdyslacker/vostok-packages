# Конфигурация сети для Vostok Linux (на базе Void)
---
# Копировать настройки из Live-системы
copyNetwork: true
copyNetworkConnections: true
copyWpaSupplicant: false  # ← NetworkManager сам управляет wpa_supplicant

# Управление сетевыми службами
manageWireless: true
manageWired: true

# Дополнительные настройки для Void
configServices: false  # Calamares НЕ управляет runit сервисами
persistNetwork: true  # сохранять временные соединения

# Настройки hostname
setHostname: "vostok"  # временный hostname
writeHostsFile: true

# Для специальных случаев
skipIfNoInternet: false  # не пропускать даже без интернета