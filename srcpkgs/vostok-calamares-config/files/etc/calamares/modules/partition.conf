# Настройки разметки диска для Vostok Linux
---
# Начальная таблица разделов
initialPartitionTableChoice: gpt

# Настройки swap (оптимальные для Void)
initialSwapChoice: suspend  # ← МЕНЯЕМ: учитывает гибернацию
swapPartitionName: "swap"
# swapPartitionSize: не указываем - Calamares сам рассчитает
swapFileSystem: "swap"
ensureSuspendToDisk: true

# Файловые системы
defaultFileSystemType: "ext4"
availableFileSystemTypes:
  - "ext4"
  - "btrfs"
  - "xfs"
  - "f2fs"
  - "nilfs2"  # ← ДОБАВЛЯЕМ: Void поддерживает

# EFI раздел (UEFI) - ПРАВИЛЬНО для Void!
efiSystemPartition: "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "EFI"
efiSystemPartitionMountPoint: "/boot/efi"
efiSystemPartitionFileSystem: "fat32"  # ← ДОБАВЛЯЕМ

# Автоматическая разметка - УПРОЩАЕМ как ты советуешь
layout:
  - name: "root"
    filesystem: "ext4"
    mountPoint: "/"
    size: 100%  # ← ВСЁ на корень (кроме EFI и swap)
    
# Или так для гибкости:
# layout:
#   - name: "root"
#     filesystem: "ext4"
#     mountPoint: "/"
#     size: 40%
#     minSize: 32G  # Минимум 32GB для системы и обновлений
#     maxSize: 200G  # Максимум 200GB
#   - name: "home"
#     filesystem: "ext4"
#     mountPoint: "/home"
#     size: 60%
#     minSize: 10G

# Параметры интерфейса
allowManualPartitioning: true
allowAutomatedPartitioning: true
drawNestedPartitions: false
alwaysShowPartitionLabels: true
showEncryptionOption: true  # ← ДОБАВЛЯЕМ: возможность шифрования

# Проверки
requiredStorage: 32G  # ← УВЕЛИЧИВАЕМ: Void с обновлениями требует больше
checkPartitions: true
neverCreateSwap: false

# Void-специфичные настройки
enableLuksAutomatedPartitioning: true  # ← ВКЛЮЧАЕМ! Void отлично работает с LUKS
requiredPartitionTableType: "gpt"

# Дополнительные настройки для Void
bootloader:
  efiMountPoint: "/boot/efi"
  #efiPartition: ""  # или "/dev/sda1"
  installEFIFallback: true

# Флаги разделов
flags:
  efi: ["boot", "esp"]  # ← ПРАВИЛЬНЫЙ синтаксис!
  boot: ["boot"]
  
# Подсветка разделов
partitionLabels:
  efi: "EFI System Partition"
  root: "Void Linux Root"
  swap: "Linux Swap"