# Настройка загрузчика для Vostok Linux (на базе Void)
---
# Используемый загрузчик (grub для UEFI/BIOS, systemd-boot для pure UEFI)
bootloader: "grub"

# EFI настройки (CRITICAL для Void!)
efiBootMgr: true
efibootmgr: "efibootmgr"  # команда для управления EFI
installEFIFallback: true   # ← ЖИЗНЕННО ВАЖНО! Копирует в EFI/BOOT/BOOTX64.EFI

# Пути установки
efiBootloaderId: "vostok"  # без пробелов для надёжности
installPath: "/boot/efi"   # должно совпадать с partition.conf!

# Ядро и initramfs (НЕ указываем явно - Void имеет версии)
# kernel: "/boot/vmlinuz"      # ← УДАЛИТЬ (мешает работе)
# initramfs: "/boot/initramfs" # ← УДАЛИТЬ
# Calamares сам найдёт актуальные версии в /boot

# Команды GRUB (Void использует стандартные)
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"  # для определения root

# Обнаружение других ОС (требует пакет os-prober)
osProber: true

# Дополнительные настройки
timeout: 5
kernelLine: "loglevel=4"  # или "quiet" для минимального вывода
updateNvram: true  # добавляет запись в NVRAM
clearNvram: false  # НЕ включать - удалит другие ОС!

# Настройки для BIOS (legacy)
gfxmode: "auto"
terminal: "gfxterm"  # графический терминал

# Драйверы для GRUB (для проблемного железа)
grubModules:
  - all_video
  - efi_gop
  - efi_uga
  - font
  - gfxterm
  - gzio
  - halt
  - iso9660
  - linux
  - part_gpt
  - part_msdos

# Хуки для initramfs (особенно важно для Void)
initramfs:
  kernel: true  # обновлять initramfs при смене ядра
  microcode: true  # обновлять микрокод Intel/AMD

# Отладка (для разработки)
debug: false